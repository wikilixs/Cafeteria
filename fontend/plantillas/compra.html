<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacer Compra</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        input, select { width: 100%; padding: 5px; }
        button { padding: 10px 20px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hacer una Compra</h1>
        <form id="compraForm">
            <label for="proveedor">Proveedor:</label>
            <select id="proveedor" required></select>

            <label for="usuario">ID Usuario:</label>
            <input type="number" id="usuario" value="1" required>

            <h2>Detalles de la Compra</h2>
            <table id="detallesTable">
                <thead>
                    <tr>
                        <th>Insume</th>
                        <th>Cantidad</th>
                        <th>Costo Unitario</th>
                        <th>Fecha Vencimiento (opcional)</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="detallesBody">
                    <!-- Rows will be added here -->
                </tbody>
            </table>
            <button type="button" onclick="addRow()">Agregar Insumo</button>
            <button type="submit">Registrar Compra</button>
        </form>

        <h2>Reporte de Compras</h2>
        <form id="reporteForm">
            <label for="fechaInicio">Fecha Inicio:</label>
            <input type="date" id="fechaInicio">

            <label for="fechaFin">Fecha Fin:</label>
            <input type="date" id="fechaFin">

            <label for="proveedorReporte">Proveedor:</label>
            <select id="proveedorReporte">
                <option value="">Todos</option>
            </select>

            <button type="button" onclick="cargarReporte()">Cargar Reporte</button>
        </form>

        <table id="reporteTable" style="display: none;">
            <thead>
                <tr>
                    <th>ID Compra</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                    <th>Proveedor</th>
                    <th>Usuario</th>
                    <th>Insumo</th>
                    <th>Cantidad</th>
                    <th>Costo Unitario</th>
                    <th>Subtotal</th>
                </tr>
            </thead>
            <tbody id="reporteBody">
            </tbody>
        </table>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';

        async function loadProveedores() {
            try {
                const response = await fetch(`${API_BASE}/proveedor/`);
                const proveedores = await response.json();
                const select = document.getElementById('proveedor');
                select.innerHTML = '<option value="">Seleccionar Proveedor</option>';
                proveedores.forEach(p => {
                    select.innerHTML += `<option value="${p.id_proveedor}">${p.nombre}</option>`;
                });

                // También cargar en el select de reporte
                const selectReporte = document.getElementById('proveedorReporte');
                selectReporte.innerHTML = '<option value="">Todos</option>';
                proveedores.forEach(p => {
                    selectReporte.innerHTML += `<option value="${p.id_proveedor}">${p.nombre}</option>`;
                });
            } catch (error) {
                console.error('Error loading proveedores:', error);
            }
        }

        async function loadInsumos() {
            try {
                const response = await fetch(`${API_BASE}/insumo/`);
                window.insumos = await response.json();
            } catch (error) {
                console.error('Error loading insumos:', error);
            }
        }

        function addRow() {
            const tbody = document.getElementById('detallesBody');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>
                    <select class="insumo" required>
                        <option value="">Seleccionar Insumo</option>
                        ${window.insumos.map(i => `<option value="${i.id_insumo}">${i.nombre}</option>`).join('')}
                    </select>
                </td>
                <td><input type="number" class="cantidad" step="0.01" required></td>
                <td><input type="number" class="costo" step="0.01" required></td>
                <td><input type="date" class="vencimiento"></td>
                <td><button type="button" onclick="removeRow(this)">Eliminar</button></td>
            `;
            tbody.appendChild(row);
        }

        function removeRow(button) {
            button.closest('tr').remove();
        }

        document.getElementById('compraForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id_proveedor = document.getElementById('proveedor').value;
            const id_usuario = document.getElementById('usuario').value;
            const rows = document.querySelectorAll('#detallesBody tr');
            const detalles = [];

            rows.forEach(row => {
                const insumo = row.querySelector('.insumo').value;
                const cantidad = row.querySelector('.cantidad').value;
                const costo = row.querySelector('.costo').value;
                const vencimiento = row.querySelector('.vencimiento').value;
                if (insumo && cantidad && costo) {
                    detalles.push({
                        id_insumo: parseInt(insumo),
                        cantidad: parseFloat(cantidad),
                        costo_unitario: parseFloat(costo),
                        fecha_vencimiento: vencimiento || null
                    });
                }
            });

            if (detalles.length === 0) {
                alert('Agregue al menos un insumo');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/compra/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id_proveedor: id_proveedor ? parseInt(id_proveedor) : null,
                        id_usuario: parseInt(id_usuario),
                        detalles
                    })
                });
                const result = await response.json();
                if (response.ok) {
                    alert(`Compra registrada con ID: ${result.id_compra}, Total: ${result.total}`);
                    location.reload();
                } else {
                    alert('Error: ' + result.detail);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error al registrar la compra');
            }
        });

        window.onload = () => {
            loadProveedores();
            loadInsumos();
        };

        async function cargarReporte() {
            const fechaInicio = document.getElementById('fechaInicio').value;
            const fechaFin = document.getElementById('fechaFin').value;
            const idProveedor = document.getElementById('proveedorReporte').value;

            let url = `${API_BASE}/compra/reporte?`;
            if (fechaInicio) url += `fecha_inicio=${fechaInicio}&`;
            if (fechaFin) url += `fecha_fin=${fechaFin}&`;
            if (idProveedor) url += `id_proveedor=${idProveedor}&`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                const tbody = document.getElementById('reporteBody');
                tbody.innerHTML = '';

                data.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${item.id_compra}</td>
                        <td>${item.fecha}</td>
                        <td>${item.estado}</td>
                        <td>${item.proveedor || 'N/A'}</td>
                        <td>${item.usuario}</td>
                        <td>${item.insumo}</td>
                        <td>${item.cantidad}</td>
                        <td>${item.costo_unitario}</td>
                        <td>${item.subtotal}</td>
                    `;
                    tbody.appendChild(row);
                });

                document.getElementById('reporteTable').style.display = 'table';
            } catch (error) {
                console.error('Error cargando reporte:', error);
                alert('Error al cargar el reporte');
            }
        }
    </script>
</body>
</html>
